<div
  class="work-order-bar"
  [class.menu-open]="menuOpen"
  [style.left.px]="leftPx"
  [style.width.px]="widthPx"
  [style.background]="barBg"
  [style.border-color]="barBorder"
  (click)="onBarClick($event)"
  (mouseenter)="onBarEnter()"
  (mouseleave)="onBarLeave()"
  role="button"
  tabindex="0"
  [attr.aria-label]="order.data.name + ' — ' + statusLabel + ', ' + tooltipDateRange"
>
  <span class="bar-name">{{ order.data.name }}</span>
  <span
    class="bar-status"
    [style.background]="badgeBg"
    [style.color]="badgeText"
  >{{ statusLabel }}</span>

  @if (isHovered || menuOpen) {
    <div class="bar-actions">
      <button
        class="three-dot-btn"
        (click)="toggleMenu($event)"
        type="button"
        [attr.aria-label]="'Actions for ' + order.data.name"
        [attr.aria-expanded]="menuOpen"
      >
        ···
      </button>

      @if (menuOpen) {
        <div class="dropdown-menu" role="menu">
          <button class="dropdown-item" (click)="onEdit($event)" role="menuitem">Edit</button>
          <button class="dropdown-item delete-item" (click)="onDelete($event)" role="menuitem">Delete</button>
        </div>
      }
    </div>
  }

  @if (barTooltipVisible && !menuOpen) {
    <div class="bar-tooltip" role="tooltip">
      <div class="bar-tooltip-name">{{ order.data.name }}</div>
      <div class="bar-tooltip-status">
        <span
          class="bar-tooltip-badge"
          [style.background]="badgeBg"
          [style.color]="badgeText"
        >{{ statusLabel }}</span>
      </div>
      <div class="bar-tooltip-dates">{{ tooltipDateRange }}</div>
    </div>
  }
</div>
