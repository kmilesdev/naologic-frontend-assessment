<div
  class="work-order-bar"
  [style.left.px]="leftPx"
  [style.width.px]="widthPx"
  [style.background]="barBg"
  [style.border-color]="barBorder"
  (click)="onBarClick($event)"
  (mouseenter)="isHovered = true"
  (mouseleave)="isHovered = false; menuOpen = false"
>
  <span class="bar-name">{{ order.data.name }}</span>
  <span
    class="bar-status"
    [style.background]="badgeBg"
    [style.color]="badgeText"
  >{{ statusLabel }}</span>

  @if (isHovered) {
    <div class="bar-actions">
      <button class="three-dot-btn" (click)="toggleMenu($event)" type="button">
        ···
      </button>

      @if (menuOpen) {
        <div class="dropdown-menu">
          <button class="dropdown-item" (click)="onEdit($event)">Edit</button>
          <button class="dropdown-item" (click)="onDelete($event)">Delete</button>
        </div>
      }
    </div>
  }
</div>
