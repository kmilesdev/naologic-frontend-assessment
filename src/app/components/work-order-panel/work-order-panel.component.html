@if (isOpen) {
  <div class="panel-overlay" (click)="close()" aria-hidden="true"></div>
  <div
    class="panel-container"
    [class.closing]="isClosing"
    role="dialog"
    aria-modal="true"
    aria-label="Work Order Details"
  >
    <div class="panel-header">
      <div class="panel-header-left">
        <h2 id="panel-title">Work Order Details</h2>
        <p class="panel-subtitle">Specify the dates, name and status for this order</p>
      </div>
      <div class="panel-header-right">
        <button type="button" class="btn-cancel" (click)="close()" aria-label="Cancel and close panel">Cancel</button>
        <button type="button" class="btn-create" (click)="onSubmit()">
          {{ mode === 'create' ? 'Create' : 'Save' }}
        </button>
      </div>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="panel-form">
      @if (overlapError) {
        <div class="error-banner" role="alert">
          {{ overlapError }}
        </div>
      }

      <div class="form-group">
        <label for="wo-name">Work Order Name</label>
        <input
          #nameInput
          id="wo-name"
          type="text"
          formControlName="name"
          placeholder="Acme Inc."
          class="form-input"
          [class.focused]="true"
          [class.invalid]="form.get('name')?.touched && form.get('name')?.invalid"
          aria-required="true"
        />
      </div>

      <div class="form-group">
        <label for="wo-status">Status</label>
        <ng-select
          formControlName="status"
          [items]="statusOptions"
          bindLabel="label"
          bindValue="value"
          [clearable]="false"
          [searchable]="false"
          placeholder="Select status"
          class="status-select"
          aria-label="Work order status"
        >
          <ng-template ng-label-tmp let-item="item">
            <span
              class="status-badge-inline"
              [style.background]="getStatusBadgeBg(item.value)"
              [style.color]="getStatusBadgeText(item.value)"
            >{{ item.label }}</span>
          </ng-template>
          <ng-template ng-option-tmp let-item="item">
            <span class="status-option-text">{{ item.label }}</span>
          </ng-template>
        </ng-select>
      </div>

      <div class="form-group">
        <label for="wo-end-date">End date</label>
        <div class="date-input-wrapper">
          <input
            id="wo-end-date"
            class="form-input"
            [value]="formatNgbDate($any(form.get('endDate')?.value))"
            placeholder="MM.DD.YYYY"
            ngbDatepicker
            #dpEnd="ngbDatepicker"
            formControlName="endDate"
            [class.invalid]="form.get('endDate')?.touched && form.get('endDate')?.invalid"
            (click)="dpEnd.toggle()"
            readonly
            aria-required="true"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="wo-start-date">Start date</label>
        <div class="date-input-wrapper">
          <input
            id="wo-start-date"
            class="form-input"
            [value]="formatNgbDate($any(form.get('startDate')?.value))"
            placeholder="MM.DD.YYYY"
            ngbDatepicker
            #dpStart="ngbDatepicker"
            formControlName="startDate"
            [class.invalid]="form.get('startDate')?.touched && form.get('startDate')?.invalid"
            (click)="dpStart.toggle()"
            readonly
            aria-required="true"
          />
        </div>
      </div>

      @if (form.hasError('dateRange')) {
        <div class="field-error" role="alert">End date must be after start date</div>
      }
    </form>
  </div>
}
