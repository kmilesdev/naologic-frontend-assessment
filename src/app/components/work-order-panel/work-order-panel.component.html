@if (isOpen) {
  <div class="panel-container">
    <div class="panel-header">
      <div class="panel-header-left">
        <h2>Work Order Details</h2>
        <p class="panel-subtitle">Specify the dates, name and status for this order</p>
      </div>
      <div class="panel-header-right">
        <button type="button" class="btn-cancel" (click)="close()">Cancel</button>
        <button type="button" class="btn-create" (click)="onSubmit()">
          {{ mode === 'create' ? 'Create' : 'Save' }}
        </button>
      </div>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="panel-form">
      @if (overlapError) {
        <div class="error-banner">
          {{ overlapError }}
        </div>
      }

      <div class="form-group">
        <label for="wo-name">Work Order Name</label>
        <input
          id="wo-name"
          type="text"
          formControlName="name"
          placeholder="Acme Inc."
          class="form-input"
          [class.focused]="true"
          [class.invalid]="form.get('name')?.touched && form.get('name')?.invalid"
        />
      </div>

      <div class="form-group">
        <label for="wo-status">Status</label>
        <ng-select
          formControlName="status"
          [items]="statusOptions"
          bindLabel="label"
          bindValue="value"
          [clearable]="false"
          [searchable]="false"
          placeholder="Select status"
          class="status-select"
        >
          <ng-template ng-label-tmp let-item="item">
            <span
              class="status-badge-inline"
              [style.background]="getStatusBadgeBg(item.value)"
              [style.color]="getStatusBadgeText(item.value)"
            >{{ item.label }}</span>
          </ng-template>
          <ng-template ng-option-tmp let-item="item">
            <span class="status-option-text">{{ item.label }}</span>
          </ng-template>
        </ng-select>
      </div>

      <div class="form-group">
        <label>End date</label>
        <div class="date-input-wrapper">
          <input
            class="form-input"
            [value]="formatNgbDate($any(form.get('endDate')?.value))"
            placeholder="MM.DD.YYYY"
            ngbDatepicker
            #dpEnd="ngbDatepicker"
            formControlName="endDate"
            [class.invalid]="form.get('endDate')?.touched && form.get('endDate')?.invalid"
            (click)="dpEnd.toggle()"
            readonly
          />
        </div>
      </div>

      <div class="form-group">
        <label>Start date</label>
        <div class="date-input-wrapper">
          <input
            class="form-input"
            [value]="formatNgbDate($any(form.get('startDate')?.value))"
            placeholder="MM.DD.YYYY"
            ngbDatepicker
            #dpStart="ngbDatepicker"
            formControlName="startDate"
            [class.invalid]="form.get('startDate')?.touched && form.get('startDate')?.invalid"
            (click)="dpStart.toggle()"
            readonly
          />
        </div>
      </div>

      @if (form.hasError('dateRange')) {
        <div class="field-error">End date must be after start date</div>
      }
    </form>
  </div>
}
